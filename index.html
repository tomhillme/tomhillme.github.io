<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Hill</title>
  <meta name="description" content="Tom Hill — tom@tomhill.me">
  <meta property="og:title" content="Tom Hill">
  <meta property="og:description" content="tom@tomhill.me">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='78' font-size='80' font-family='sans-serif' font-weight='700' fill='white'>T</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      color: #f0ece2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0 8vw 8vh;
    }

    .name {
      font-size: clamp(3.5rem, 18vw, 22vw);
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .name-line {
      display: block;
      overflow: hidden;
    }

    .char {
      display: inline-block;
      overflow: hidden;
    }

    .char-inner {
      display: inline-block;
      will-change: transform;
    }

    /* Email — clearly interactive */
    .email {
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9ca3af;
      text-decoration: none;
      opacity: 0;
      transform: translateY(20px);
      width: fit-content;
      position: relative;
      padding-bottom: 2px;
      transition: color 0.3s ease;
    }

    .email::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      opacity: 0.4;
      transform-origin: left;
      transition: opacity 0.3s ease;
    }

    .email:hover {
      color: #f0ece2;
    }

    .email:hover::after {
      opacity: 1;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #f0ece2;
      margin: 2rem 0;
      transform: scaleX(0);
      transform-origin: left;
      opacity: 0.25;
    }

    .links {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Links — pill-shaped, clearly clickable */
    .link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #9ca3af;
      text-decoration: none;
      font-size: clamp(0.7rem, 0.8vw, 0.85rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
      padding: 10px 18px;
      border: 1px solid rgba(156, 163, 175, 0.15);
      border-radius: 100px;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      will-change: transform;
    }

    .link:hover {
      color: #f0ece2;
      border-color: rgba(240, 236, 226, 0.25);
      background: rgba(240, 236, 226, 0.04);
    }

    .link-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .link:hover .link-icon {
      transform: scale(1.1) rotate(3deg);
    }

    /* Arrow indicator */
    .link-arrow {
      width: 12px;
      height: 12px;
      margin-left: 2px;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .link:hover .link-arrow {
      opacity: 0.6;
      transform: translateX(0);
    }

    .sc-bars {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: 2px;
    }

    .sc-bar {
      width: 2px;
      border-radius: 1px;
      background: currentColor;
      transform-origin: center;
      will-change: transform;
    }

    .sc-bar:nth-child(1) { height: 8px; }
    .sc-bar:nth-child(2) { height: 12px; }
    .sc-bar:nth-child(3) { height: 6px; }
    .sc-bar:nth-child(4) { height: 14px; }
    .sc-bar:nth-child(5) { height: 9px; }

    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      opacity: 0;
      will-change: transform;
    }

    .cursor-dot {
      width: 6px;
      height: 6px;
      background: #f0ece2;
    }

    .cursor-ring {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(240, 236, 226, 0.4);
      z-index: 9998;
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .cursor-ring.hovering {
      width: 60px;
      height: 60px;
      border-color: rgba(240, 236, 226, 0.2);
      background: rgba(240, 236, 226, 0.04);
    }

    @media (max-width: 768px) {
      main {
        padding: 0 6vw 6vh;
        align-items: center;
        text-align: center;
      }

      .name {
        font-size: clamp(3rem, 20vw, 28vw);
      }

      .divider {
        margin: 1.5rem auto;
        transform-origin: center;
      }

      .links {
        flex-direction: column;
        gap: 0.75rem;
        width: 100%;
        max-width: 280px;
      }

      .link {
        justify-content: center;
        width: 100%;
        padding: 14px 20px;
      }

      .link-arrow {
        opacity: 0.4;
        transform: translateX(0);
      }

      .cursor-dot, .cursor-ring {
        display: none !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <noscript>
    <style>
      .email, .link { opacity: 1 !important; transform: none !important; }
      .divider { transform: scaleX(1) !important; }
      #bg { display: none; }
      .cursor-dot, .cursor-ring { display: none; }
    </style>
  </noscript>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <main>
    <h1 class="name">
      <span class="name-line">TOM</span>
      <span class="name-line">HILL</span>
    </h1>

    <a href="mailto:tom@tomhill.me" class="email">tom@tomhill.me</a>

    <div class="divider"></div>

    <nav class="links">
      <a href="https://www.instagram.com/t.omhill" target="_blank" rel="noopener" class="link" data-magnetic>
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

        </div>
        <svg class="link-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

      <a href="https://www.linkedin.com/in/thomascharliehill/" target="_blank" rel="noopener" class="link" data-magnetic>
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>

        </svg>
        <span>LinkedIn</span>
        <svg class="link-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

    </nav>
  </main>

  <script>
  document.addEventListener('DOMContentLoaded', () => {

    /* ================================================================
       CONFIG
    ================================================================ */
    const IS_MOBILE = window.matchMedia('(pointer: coarse)').matches;
    const IS_LOW_END = (navigator.hardwareConcurrency || 4) < 4 || (navigator.deviceMemory || 4) < 4;
    const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const DPR_SCALE = IS_MOBILE ? 0.45 : (IS_LOW_END ? 0.5 : 0.65);
    const NOISE_OCTAVES = IS_MOBILE || IS_LOW_END ? 3 : 5;

    /* ================================================================
       WEBGL SHADERS
    ================================================================ */
    const VERT_SRC = `#version 300 es
      in vec2 a_position;
      out vec2 v_uv;
      void main() {
        v_uv = a_position * 0.5 + 0.5;
        gl_Position = vec4(a_position, 0.0, 1.0);
      }`;

    const FRAG_SRC = `#version 300 es
      precision highp float;

      in vec2 v_uv;
      out vec4 fragColor;

      uniform float u_time;
      uniform vec2 u_resolution;
      uniform vec2 u_mouse;
      uniform float u_mouseVelocity;

      /* Simplex 3D noise — Ashima Arts (MIT) */
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 1.0 / 7.0;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m * m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      float fbm(vec3 p) {
        float val = 0.0;
        float amp = 0.5;
        float freq = 1.0;
        for (int i = 0; i < ${NOISE_OCTAVES}; i++) {
          val += amp * snoise(p * freq);
          amp *= 0.5;
          freq *= 2.0;
        }
        return val;
      }

      float pattern(vec2 p, float t) {
        vec3 pos = vec3(p, t * 0.08);
        vec2 q = vec2(
          fbm(pos + vec3(0.0, 0.0, 0.0)),
          fbm(pos + vec3(5.2, 1.3, 0.0))
        );
        vec2 r = vec2(
          fbm(pos + 4.0 * vec3(q, 0.0) + vec3(1.7, 9.2, t * 0.12)),
          fbm(pos + 4.0 * vec3(q, 0.0) + vec3(8.3, 2.8, t * 0.1))
        );
        return fbm(pos + 4.0 * vec3(r, 0.0));
      }

      void main() {
        vec2 uv = v_uv;
        float aspect = u_resolution.x / u_resolution.y;
        uv.x *= aspect;

        vec2 p = uv * 1.8;

        /* Mouse distortion */
        vec2 mUV = u_mouse;
        mUV.x *= aspect;
        vec2 mP = mUV * 1.8;
        vec2 toM = p - mP;
        float mDist = length(toM);
        float mInf = smoothstep(0.8, 0.0, mDist) * (0.25 + u_mouseVelocity * 2.5);
        p += normalize(toM + 0.0001) * mInf * 0.45;

        float f = pattern(p, u_time);

        /* Monochrome mapping */
        float b = smoothstep(-0.4, 0.9, f);
        b = b * b;
        b *= 0.55;
        b += 0.018;

        /* Vignette */
        float vig = 1.0 - smoothstep(0.3, 1.5, length(v_uv - 0.5) * 1.8);
        b *= mix(0.35, 1.0, vig);

        /* Film grain */
        float grain = fract(sin(dot(v_uv * u_time * 0.5, vec2(12.9898, 78.233))) * 43758.5453);
        b += (grain - 0.5) * 0.02;

        vec3 col = vec3(b * 0.96, b * 0.94, b * 0.90);
        fragColor = vec4(col, 1.0);
      }`;

    /* ================================================================
       WEBGL SETUP
    ================================================================ */
    function createShader(gl, type, source) {
      const s = gl.createShader(type);
      gl.shaderSource(s, source);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error('Shader:', gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    function initWebGL() {
      const canvas = document.getElementById('bg');
      const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, depth: false, stencil: false });
      if (!gl) return null;

      const vs = createShader(gl, gl.VERTEX_SHADER, VERT_SRC);
      const fs = createShader(gl, gl.FRAGMENT_SHADER, FRAG_SRC);
      if (!vs || !fs) return null;

      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.error('Program:', gl.getProgramInfoLog(prog));
        return null;
      }

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

      const posLoc = gl.getAttribLocation(prog, 'a_position');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
      gl.useProgram(prog);

      const uniforms = {
        time: gl.getUniformLocation(prog, 'u_time'),
        resolution: gl.getUniformLocation(prog, 'u_resolution'),
        mouse: gl.getUniformLocation(prog, 'u_mouse'),
        mouseVelocity: gl.getUniformLocation(prog, 'u_mouseVelocity'),
      };

      return { gl, canvas, uniforms };
    }

    function resizeCanvas(webgl) {
      const { canvas, gl } = webgl;
      const dpr = Math.min(window.devicePixelRatio || 1, 2) * DPR_SCALE;
      const w = Math.floor(canvas.clientWidth * dpr);
      const h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }

    /* ================================================================
       MOUSE STATE
    ================================================================ */
    const mouse = {
      targetX: 0.5, targetY: 0.5,
      smoothX: 0.5, smoothY: 0.5,
      prevX: 0.5, prevY: 0.5,
      velocity: 0,
      clientX: window.innerWidth / 2,
      clientY: window.innerHeight / 2,
    };

    window.addEventListener('mousemove', (e) => {
      mouse.targetX = e.clientX / window.innerWidth;
      mouse.targetY = 1.0 - (e.clientY / window.innerHeight);
      mouse.clientX = e.clientX;
      mouse.clientY = e.clientY;
    });

    /* ================================================================
       RENDER LOOP
    ================================================================ */
    function startRenderLoop(webgl) {
      const { gl, uniforms } = webgl;
      const startTime = performance.now() * 0.001;

      function frame() {
        resizeCanvas(webgl);

        mouse.smoothX += (mouse.targetX - mouse.smoothX) * 0.045;
        mouse.smoothY += (mouse.targetY - mouse.smoothY) * 0.045;

        const dx = mouse.targetX - mouse.prevX;
        const dy = mouse.targetY - mouse.prevY;
        const vel = Math.sqrt(dx * dx + dy * dy);
        mouse.velocity += (vel - mouse.velocity) * 0.08;
        mouse.prevX = mouse.targetX;
        mouse.prevY = mouse.targetY;

        const t = performance.now() * 0.001 - startTime;

        gl.uniform1f(uniforms.time, t);
        gl.uniform2f(uniforms.resolution, webgl.canvas.width, webgl.canvas.height);
        gl.uniform2f(uniforms.mouse, mouse.smoothX, mouse.smoothY);
        gl.uniform1f(uniforms.mouseVelocity, Math.min(mouse.velocity, 1.0));

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(frame);
      }

      frame();
    }

    /* ================================================================
       TEXT SPLITTING
    ================================================================ */
    function splitText(el) {
      const text = el.textContent;
      el.textContent = '';
      const chars = [];
      for (const ch of text) {
        const outer = document.createElement('span');
        outer.className = 'char';
        const inner = document.createElement('span');
        inner.className = 'char-inner';
        inner.textContent = ch === ' ' ? '\u00A0' : ch;
        inner.style.transform = 'translateY(110%) rotateX(-10deg)';
        outer.appendChild(inner);
        el.appendChild(outer);
        chars.push(inner);
      }
      return chars;
    }

    /* ================================================================
       CUSTOM CURSOR
    ================================================================ */
    function initCursor() {
      if (IS_MOBILE) return;

      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');

      document.body.style.cursor = 'none';
      document.querySelectorAll('a, button').forEach(el => { el.style.cursor = 'none'; });

      const dotX = gsap.quickTo(dot, 'x', { duration: 0.12, ease: 'power3.out' });
      const dotY = gsap.quickTo(dot, 'y', { duration: 0.12, ease: 'power3.out' });
      const ringX = gsap.quickTo(ring, 'x', { duration: 0.35, ease: 'power3.out' });
      const ringY = gsap.quickTo(ring, 'y', { duration: 0.35, ease: 'power3.out' });

      window.addEventListener('mousemove', (e) => {
        dotX(e.clientX - 3);
        dotY(e.clientY - 3);
        ringX(e.clientX - 20);
        ringY(e.clientY - 20);
      });

      document.querySelectorAll('.link, .email').forEach(el => {
        el.addEventListener('mouseenter', () => {
          ring.classList.add('hovering');
          gsap.to(dot, { scale: 0.5, duration: 0.25, ease: 'power2.out' });
        });
        el.addEventListener('mouseleave', () => {
          ring.classList.remove('hovering');
          gsap.to(dot, { scale: 1, duration: 0.25, ease: 'power2.out' });
        });
      });

      window.addEventListener('mousedown', () => {
        gsap.to(dot, { scale: 0.4, duration: 0.1 });
        gsap.to(ring, { scale: 0.85, duration: 0.1 });
      });
      window.addEventListener('mouseup', () => {
        gsap.to(dot, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
        gsap.to(ring, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
      });

      gsap.to([dot, ring], { opacity: 1, duration: 0.6, delay: 0.5 });
    }

    /* ================================================================
       MAGNETIC HOVER
    ================================================================ */
    function initMagnetic() {
      if (IS_MOBILE) return;

      document.querySelectorAll('[data-magnetic]').forEach(el => {
        el.addEventListener('mousemove', (e) => {
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;

          gsap.to(el, {
            x: dx * 0.35,
            y: dy * 0.35,
            duration: 0.3,
            ease: 'power2.out',
            overwrite: 'auto',
          });
        });

        el.addEventListener('mouseleave', () => {
          gsap.to(el, {
            x: 0,
            y: 0,
            duration: 0.7,
            ease: 'elastic.out(1, 0.3)',
            overwrite: 'auto',
          });
        });

        if (IS_MOBILE) {
          el.addEventListener('touchstart', () => {
            gsap.to(el, { scale: 0.95, duration: 0.1 });
          }, { passive: true });
          el.addEventListener('touchend', () => {
            gsap.to(el, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
          }, { passive: true });
        }
      });
    }

    /* ================================================================
       SOUNDCLOUD WAVEFORM
    ================================================================ */
    function initWaveform() {
      const scLink = document.querySelector('.link-soundcloud');
      if (!scLink) return;

      const bars = scLink.querySelectorAll('.sc-bar');
      let anim = null;

      scLink.addEventListener('mouseenter', () => {
        if (anim) anim.kill();
        anim = gsap.to(bars, {
          scaleY: () => 0.3 + Math.random() * 1.2,
          duration: 0.35,
          stagger: {
            each: 0.06,
            repeat: -1,
            yoyo: true,
          },
          ease: 'sine.inOut',
        });
      });

      scLink.addEventListener('mouseleave', () => {
        if (anim) anim.kill();
        anim = null;
        gsap.to(bars, { scaleY: 1, duration: 0.4, ease: 'power2.out' });
      });
    }

    /* ================================================================
       ENTRANCE ANIMATION
    ================================================================ */
    function playEntrance(webgl) {
      const lines = document.querySelectorAll('.name-line');
      let allChars = [];
      lines.forEach(line => {
        allChars = allChars.concat(splitText(line));
      });

      const tl = gsap.timeline();

      /* Canvas fade in */
      if (webgl) {
        tl.to('#bg', { opacity: 1, duration: 1.2, ease: 'power2.inOut' }, 0);
      }

      if (REDUCED_MOTION) {
        gsap.set(allChars, { y: '0%', rotationX: 0 });
        gsap.set('.email', { opacity: 1, y: 0 });
        gsap.set('.divider', { scaleX: 1 });
        gsap.set('.link', { opacity: 1, y: 0 });
        return;
      }

      /* Name character reveal */
      tl.to(allChars, {
        y: '0%',
        rotationX: 0,
        duration: 1.4,
        stagger: 0.04,
        ease: 'expo.out',
      }, 0.8);

      /* Email */
      tl.to('.email', {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'power3.out',
      }, '-=0.5');

      /* Divider draws in */
      tl.to('.divider', {
        scaleX: 1,
        duration: 0.7,
        ease: 'power2.inOut',
      }, '-=0.4');

      /* Links stagger in */
      tl.to('.link', {
        opacity: 1,
        y: 0,
        duration: 0.7,
        stagger: 0.1,
        ease: 'power3.out',
      }, '-=0.3');

      /* Subtle breathing on name */
      gsap.to('.name', {
        scale: 1.005,
        duration: 4,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1,
        delay: 3,
      });
    }

    /* ================================================================
       CSS FALLBACK BACKGROUND
    ================================================================ */
    function applyFallbackBg() {
      const canvas = document.getElementById('bg');
      canvas.style.background = 'radial-gradient(ellipse at 30% 40%, #1a1a1a 0%, #0a0a0a 70%)';
      canvas.style.opacity = '1';
    }

    /* ================================================================
       INIT
    ================================================================ */
    const webgl = initWebGL();

    if (webgl) {
      startRenderLoop(webgl);
      window.addEventListener('resize', () => resizeCanvas(webgl));
    } else {
      applyFallbackBg();
    }

    playEntrance(webgl);
    initCursor();
    initMagnetic();
    initWaveform();

  });
  </script>
</body>
</html>
