<html lang="en">
<head>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fafafa;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #111111;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      display: grid;
      grid-template-columns: 55% 45%;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 4vw 4rem 8vw;
      position: relative;
      z-index: 2;
    }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.5rem, 12vw, 16rem);
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #111111;
      margin-bottom: 1.5rem;
    }

    .name-line {
      display: block;
      overflow: hidden;
    }

    .char {
      display: inline-block;
      overflow: hidden;
    }

    .char-inner {
      display: inline-block;
      will-change: transform;
    }

    .email {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.75rem, 0.9vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b7280;
      text-decoration: none;
      opacity: 0;
      transform: translateY(20px);
      width: fit-content;
      position: relative;
      padding-bottom: 2px;
      transition: color 0.3s ease;
    }

    .email::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }

    .email:hover {
      color: #111111;
    }

    .email:hover::after {
      opacity: 1;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #d1d5db;
      margin: 2rem 0;
      transform: scaleX(0);
      transform-origin: left;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #6b7280;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.7rem, 0.8vw, 0.85rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
      padding: 10px 18px;
      border: 1px solid #e5e7eb;
      border-radius: 100px;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      will-change: transform;
    }

    .link:hover {
      color: #374151;
      border-color: #d1d5db;
      background: #f3f4f6;
    }

    .link-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .link:hover .link-icon {
      transform: scale(1.1) rotate(3deg);
    }

    .link-arrow {
      width: 12px;
      height: 12px;
      margin-left: 2px;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .link:hover .link-arrow {
      opacity: 0.5;
      transform: translateX(0);
    }

    .sc-bars {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: 2px;
    }

    .sc-bar {
      width: 2px;
      border-radius: 1px;
      background: currentColor;
      transform-origin: center;
      will-change: transform;
    }

    .sc-bar:nth-child(1) { height: 8px; }
    .sc-bar:nth-child(2) { height: 12px; }
    .sc-bar:nth-child(3) { height: 6px; }
    .sc-bar:nth-child(4) { height: 14px; }
    .sc-bar:nth-child(5) { height: 9px; }

    /* Shape column */
    .shape {
      position: relative;
      overflow: hidden;
    }

    #webgl {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .shape-fallback {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(280px, 60%);
      height: min(280px, 60%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #3a3a3a 0%, #1a1a1a 70%);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.06);
    }

    /* Custom cursor */
    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      opacity: 0;
      will-change: transform;
    }

    .cursor-dot {
      width: 6px;
      height: 6px;
      background: #111111;
    }

    .cursor-ring {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(17, 17, 17, 0.3);
      z-index: 9998;
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .cursor-ring.hovering {
      width: 60px;
      height: 60px;
      border-color: rgba(17, 17, 17, 0.15);
      background: rgba(17, 17, 17, 0.03);
    }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh auto;
      }

      .shape {
        order: -1;
      }

      .content {
        padding: 2rem 6vw 4rem;
        align-items: center;
        text-align: center;
      }

      .name {
        font-size: clamp(3rem, 18vw, 8rem);
      }

      .divider {
        margin: 1.5rem auto;
        transform-origin: center;
      }

      .links {
        flex-direction: column;
        width: 100%;
        max-width: 280px;
        gap: 0.75rem;
      }

      .link {
        justify-content: center;
        width: 100%;
        padding: 14px 20px;
      }

      .link-arrow {
        opacity: 0.4;
        transform: translateX(0);
      }

      .cursor-dot, .cursor-ring {
        display: none !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <noscript>

      .email, .link { opacity: 1 !important; transform: none !important; }

      #webgl { display: none; }
      .cursor-dot, .cursor-ring { display: none; }
      .shape-fallback { display: block; }
    </style>

</head>

  <script type="module">
    /* ================================================================
       THREE.JS IMPORT
    ================================================================ */
    let THREE = null;
    try {
      THREE = await import('three');
    } catch (e) {
      console.warn('Three.js failed to load:', e);
    }

    /* Wait for fonts (with 3s timeout) */
    await Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 3000))
    ]);

    /* ================================================================
       CONFIG
    ================================================================ */
    const IS_MOBILE = window.matchMedia('(pointer: coarse)').matches;
    const IS_LOW_END = (navigator.hardwareConcurrency || 4) < 4 || (navigator.deviceMemory || 4) < 4;
    const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const HAS_GSAP = typeof gsap !== 'undefined';

    /* ================================================================
       MOUSE STATE
    ================================================================ */
    const mouse = {
      clientX: window.innerWidth / 2,
      clientY: window.innerHeight / 2,
      smoothX: 0,
      smoothY: 0,
    };

    window.addEventListener('mousemove', (e) => {
      mouse.clientX = e.clientX;
      mouse.clientY = e.clientY;
    });

    /* ================================================================
       GLSL SHADERS
    ================================================================ */
    const VERTEX_SHADER = `
      uniform float uTime;
      uniform vec2 uMouse;

      varying vec3 vNormal;
      varying vec3 vViewPosition;
      varying float vDisplacement;

      /* Simplex 3D noise — Ashima Arts (MIT) */
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 1.0 / 7.0;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
      }

      void main() {
        /* Noise displacement along normal */
        float n = snoise(position * 0.8 + uTime * 0.4);
        float displacement = n * 0.25;
        vec3 newPos = position + normal * displacement;

        /* Mouse interaction — bulge toward cursor */
        vec4 mvP = modelViewMatrix * vec4(newPos, 1.0);
        vec4 clipP = projectionMatrix * mvP;
        vec2 ndc = clipP.xy / clipP.w;
        float md = length(ndc - uMouse);
        float mi = smoothstep(0.6, 0.0, md) * 0.12;
        newPos += normal * mi;

        vec4 finalMV = modelViewMatrix * vec4(newPos, 1.0);
        vNormal = normalize(normalMatrix * normal);
        vViewPosition = -finalMV.xyz;
        vDisplacement = displacement;

        gl_Position = projectionMatrix * finalMV;
      }
    `;

    const FRAGMENT_SHADER = `
      precision highp float;

      varying vec3 vNormal;
      varying vec3 vViewPosition;
      varying float vDisplacement;

      void main() {
        vec3 N = normalize(vNormal);
        vec3 V = normalize(vViewPosition);
        vec3 L = normalize(vec3(0.5, 0.8, 1.0));

        /* Half-Lambert diffuse */
        float diff = dot(N, L) * 0.5 + 0.5;
        diff = pow(diff, 1.5);

        /* Fresnel rim */
        float fresnel = pow(1.0 - max(dot(V, N), 0.0), 2.5);

        /* Base color: dark gray */
        vec3 base = vec3(0.16);
        base += vDisplacement * 0.08;

        /* Apply lighting */
        vec3 color = base * (0.35 + diff * 0.65);

        /* White Fresnel rim */
        color = mix(color, vec3(0.95), fresnel * 0.65);

        /* Subtle top gradient */
        color += N.y * 0.03;

        gl_FragColor = vec4(color, 0.92);
      }
    `;

    /* ================================================================
       THREE.JS — MORPHING 3D SHAPE
    ================================================================ */
    let shapeActive = false;

    function initShape() {
      if (!THREE) return false;

      const canvas = document.getElementById('webgl');
      const container = document.querySelector('.shape');
      if (!canvas || !container) return false;

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({
          canvas,
          alpha: true,
          antialias: true,
        });
      } catch (e) {
        return false;
      }

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.z = 4;

      /* Geometry — higher detail on desktop */
      const detail = (IS_MOBILE || IS_LOW_END) ? 3 : 4;
      const geometry = new THREE.IcosahedronGeometry(1, detail);

      /* Custom ShaderMaterial */
      const material = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uMouse: { value: new THREE.Vector2(0, 0) },
        },
        vertexShader: VERTEX_SHADER,
        fragmentShader: FRAGMENT_SHADER,
        transparent: true,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.x = 0.3;
      scene.add(mesh);

      /* Resize handler */
      function onResize() {
        const rect = container.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        if (w === 0 || h === 0) return;

        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      const ro = new ResizeObserver(onResize);
      ro.observe(container);
      onResize();

      /* Render loop */
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        const elapsed = clock.getElapsedTime();
        material.uniforms.uTime.value = elapsed;

        /* Mouse → canvas-local NDC for shader */
        if (!IS_MOBILE) {
          const rect = container.getBoundingClientRect();
          const mx = ((mouse.clientX - rect.left) / rect.width) * 2 - 1;
          const my = -((mouse.clientY - rect.top) / rect.height) * 2 + 1;

          mouse.smoothX += (mx - mouse.smoothX) * 0.05;
          mouse.smoothY += (my - mouse.smoothY) * 0.05;
          material.uniforms.uMouse.value.set(mouse.smoothX, mouse.smoothY);
        }

        /* Gentle auto-rotation */
        if (!REDUCED_MOTION) {
          mesh.rotation.y += 0.002;
          mesh.rotation.x += 0.0003;
        }

        renderer.render(scene, camera);
      }

      animate();
      shapeActive = true;
      return true;
    }

    /* ================================================================
       FALLBACK (no WebGL)
    ================================================================ */
    function applyFallback() {
      const canvas = document.getElementById('webgl');
      const fallback = document.querySelector('.shape-fallback');
      if (canvas) canvas.style.display = 'none';
      if (fallback) fallback.style.display = 'block';
    }

    /* ================================================================
       TEXT SPLITTING
    ================================================================ */
    function splitText(el) {
      const text = el.textContent;
      el.textContent = '';
      const chars = [];
      for (const ch of text) {
        const outer = document.createElement('span');
        outer.className = 'char';
        const inner = document.createElement('span');
        inner.className = 'char-inner';
        inner.textContent = ch === ' ' ? '\u00A0' : ch;
        inner.style.transform = 'translateY(110%) rotateX(-10deg)';
        outer.appendChild(inner);
        el.appendChild(outer);
        chars.push(inner);
      }
      return chars;
    }

    /* ================================================================
       CUSTOM CURSOR
    ================================================================ */
    function initCursor() {
      if (IS_MOBILE || !HAS_GSAP) return;

      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');

      document.body.style.cursor = 'none';
      document.querySelectorAll('a, button').forEach(el => { el.style.cursor = 'none'; });

      const dotX = gsap.quickTo(dot, 'x', { duration: 0.12, ease: 'power3.out' });
      const dotY = gsap.quickTo(dot, 'y', { duration: 0.12, ease: 'power3.out' });
      const ringX = gsap.quickTo(ring, 'x', { duration: 0.35, ease: 'power3.out' });
      const ringY = gsap.quickTo(ring, 'y', { duration: 0.35, ease: 'power3.out' });

      window.addEventListener('mousemove', (e) => {
        dotX(e.clientX - 3);
        dotY(e.clientY - 3);
        ringX(e.clientX - 20);
        ringY(e.clientY - 20);
      });

      document.querySelectorAll('.link, .email').forEach(el => {
        el.addEventListener('mouseenter', () => {
          ring.classList.add('hovering');
          gsap.to(dot, { scale: 0.5, duration: 0.25, ease: 'power2.out' });
        });
        el.addEventListener('mouseleave', () => {
          ring.classList.remove('hovering');
          gsap.to(dot, { scale: 1, duration: 0.25, ease: 'power2.out' });
        });
      });

      window.addEventListener('mousedown', () => {
        gsap.to(dot, { scale: 0.4, duration: 0.1 });
        gsap.to(ring, { scale: 0.85, duration: 0.1 });
      });
      window.addEventListener('mouseup', () => {
        gsap.to(dot, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
        gsap.to(ring, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
      });

      gsap.to([dot, ring], { opacity: 1, duration: 0.6, delay: 0.5 });
    }

    /* ================================================================
       MAGNETIC HOVER
    ================================================================ */
    function initMagnetic() {
      if (IS_MOBILE || !HAS_GSAP) return;

      document.querySelectorAll('[data-magnetic]').forEach(el => {
        el.addEventListener('mousemove', (e) => {
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;

          gsap.to(el, {
            x: dx * 0.35,
            y: dy * 0.35,
            duration: 0.3,
            ease: 'power2.out',
            overwrite: 'auto',
          });
        });

        el.addEventListener('mouseleave', () => {
          gsap.to(el, {
            x: 0,
            y: 0,
            duration: 0.7,
            ease: 'elastic.out(1, 0.3)',
            overwrite: 'auto',
          });
        });
      });

      /* Mobile touch feedback */
      if (IS_MOBILE) {
        document.querySelectorAll('[data-magnetic]').forEach(el => {
          el.addEventListener('touchstart', () => {
            gsap.to(el, { scale: 0.95, duration: 0.1 });
          }, { passive: true });
          el.addEventListener('touchend', () => {
            gsap.to(el, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
          }, { passive: true });
        });
      }
    }

    /* ================================================================
       SOUNDCLOUD WAVEFORM
    ================================================================ */
    function initWaveform() {
      if (!HAS_GSAP) return;

      const scLink = document.querySelector('.link-soundcloud');
      if (!scLink) return;

      const bars = scLink.querySelectorAll('.sc-bar');
      let anim = null;

      scLink.addEventListener('mouseenter', () => {
        if (anim) anim.kill();
        anim = gsap.to(bars, {
          scaleY: () => 0.3 + Math.random() * 1.2,
          duration: 0.35,
          stagger: {
            each: 0.06,
            repeat: -1,
            yoyo: true,
          },
          ease: 'sine.inOut',
        });
      });

      scLink.addEventListener('mouseleave', () => {
        if (anim) anim.kill();
        anim = null;
        gsap.to(bars, { scaleY: 1, duration: 0.4, ease: 'power2.out' });
      });
    }

    /* ================================================================
       ENTRANCE ANIMATION
    ================================================================ */
    function playEntrance(hasShape) {
      /* Split name text into individual characters */
      const lines = document.querySelectorAll('.name-line');
      let allChars = [];
      lines.forEach(line => {
        allChars = allChars.concat(splitText(line));
      });

      /* No GSAP — show everything immediately */
      if (!HAS_GSAP) {
        allChars.forEach(ch => { ch.style.transform = 'none'; });
        document.querySelectorAll('.email, .link').forEach(el => {
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
        document.querySelector('.divider').style.transform = 'scaleX(1)';
        if (hasShape) document.getElementById('webgl').style.opacity = '1';
        return;
      }

      /* Reduced motion — set final states instantly */
      if (REDUCED_MOTION) {
        gsap.set(allChars, { y: '0%', rotationX: 0 });
        gsap.set('.email', { opacity: 1, y: 0 });
        gsap.set('.divider', { scaleX: 1 });
        gsap.set('.link', { opacity: 1, y: 0 });
        if (hasShape) gsap.set('#webgl', { opacity: 1 });
        return;
      }

      const tl = gsap.timeline();

      /* 3D shape fades in */
      if (hasShape) {
        tl.to('#webgl', { opacity: 1, duration: 0.8, ease: 'power2.inOut' }, 0);
      }

      /* Name character reveal */
      tl.to(allChars, {
        y: '0%',
        rotationX: 0,
        duration: 1.4,
        stagger: 0.04,
        ease: 'expo.out',
      }, 0.6);

      /* Email */
      tl.to('.email', {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'power3.out',
      }, '-=0.5');

      /* Divider draws in */
      tl.to('.divider', {
        scaleX: 1,
        duration: 0.7,
        ease: 'power2.inOut',
      }, '-=0.4');

      /* Links stagger in */
      tl.to('.link', {
        opacity: 1,
        y: 0,
        duration: 0.7,
        stagger: 0.1,
        ease: 'power3.out',
      }, '-=0.3');

      /* Subtle breathing on name */
      gsap.to('.name', {
        scale: 1.003,
        duration: 5,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1,
        delay: 3,
      });
    }

    /* ================================================================
       SHOW ALL (emergency fallback)
    ================================================================ */
    function showEverything() {
      document.querySelectorAll('.email, .link').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
      const divider = document.querySelector('.divider');
      if (divider) divider.style.transform = 'scaleX(1)';
      const canvas = document.getElementById('webgl');
      if (canvas) canvas.style.opacity = '1';
    }

    /* ================================================================
       INIT
    ================================================================ */
    const hasShape = initShape();
    if (!hasShape) applyFallback();

    playEntrance(hasShape);
    initCursor();
    initMagnetic();
    initWaveform();
  </script>
</body>
</html>
